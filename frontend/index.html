<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover lets the app use the full screen (under the notch) in standalone mode -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sipiary — wine, your way</title>

    <!-- PWA: installable + full-screen standalone (hides browser chrome) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e0608" />
    <meta name="description" content="Track, discover and share the wines you drink." />
    <!-- Default Open Graph — public wine/profile pages get richer tags
         injected server-side (backend/lib/ogMeta.js) -->
    <meta property="og:site_name" content="Sipiary" />
    <meta property="og:title" content="Sipiary — wine, your way" />
    <meta property="og:description" content="Track, discover and share the wines you drink." />
    <meta property="og:type" content="website" />
    <!-- iOS: run full-screen from the home screen, no Safari bars -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sipiary" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Warm the connection to the flag image CDN so flags on wine cards load faster -->
    <link rel="preconnect" href="https://flagcdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://flagcdn.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
